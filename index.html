<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>云端数据管理平台</title>
    <style>
:root {
  --bg: #f6f8fb;
  --panel: #ffffff;
  --border: #dfe5ee;
  --text: #172033;
  --muted: #667085;
  --primary: #1d4ed8;
  --primary-soft: #eef4ff;
  --success: #12805c;
  --warning: #b7791f;
  --danger: #dc2626;
  --subtle: #f8fafc;
  --shadow: 0 8px 20px rgba(15, 23, 42, 0.05);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  color: var(--text);
  background: var(--bg);
  font: 14px/1.45 "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
}

button,
input,
select {
  font: inherit;
}

button {
  cursor: pointer;
}

.hidden {
  display: none !important;
}

.app-shell {
  min-width: 1120px;
  min-height: 100vh;
  background: var(--bg);
}

.login-screen {
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 32px;
  background:
    linear-gradient(135deg, rgba(29, 78, 216, 0.08), transparent 34%),
    linear-gradient(315deg, rgba(15, 118, 110, 0.08), transparent 38%),
    var(--bg);
}

.login-card {
  width: 420px;
  padding: 28px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: #fff;
  box-shadow: 0 18px 46px rgba(15, 23, 42, 0.12);
}

.login-brand {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 24px;
}

.login-brand h1 {
  margin: 0;
  font-size: 20px;
}

.login-brand p {
  margin: 4px 0 0;
  color: var(--muted);
}

.login-field {
  display: grid;
  gap: 8px;
  margin-bottom: 16px;
}

.login-field span {
  color: #344054;
  font-weight: 600;
}

.login-field input {
  height: 38px;
  padding: 0 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
}

.login-submit {
  width: 100%;
  margin-top: 4px;
}

.login-error {
  margin: -4px 0 12px;
  color: var(--danger);
  font-size: 13px;
}

.login-hint {
  display: block;
  margin-top: 12px;
  color: var(--muted);
  text-align: center;
}

.app-header {
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
  padding: 0 28px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
}

.brand,
.header-actions,
.content-header,
.content-actions,
.detail-toolbar {
  display: flex;
  align-items: center;
}

.brand {
  gap: 12px;
}

.logo {
  width: 34px;
  height: 34px;
  display: block;
  border-radius: 8px;
  object-fit: cover;
}

.brand h1 {
  margin: 0;
  font-size: 18px;
  line-height: 1;
  letter-spacing: 0;
}

.header-actions {
  justify-content: flex-end;
  gap: 12px;
}

.search-control {
  height: 34px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 0 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--muted);
  background: #fff;
}

.search-control input {
  height: 28px;
  border: 0;
  outline: none;
  color: var(--text);
  background: transparent;
}

.search-control input {
  width: 210px;
}

.ghost-button,
.secondary-button,
.mini-button,
.primary-button {
  height: 34px;
  padding: 0 14px;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: #374151;
  background: #fff;
}

.ghost-button:hover,
.secondary-button:hover,
.mini-button:hover {
  background: var(--subtle);
}

.primary-button {
  color: #fff;
  border-color: var(--primary);
  background: var(--primary);
}

.mini-button {
  height: 30px;
  padding: 0 10px;
  color: var(--muted);
  font-size: 13px;
}

.main-layout {
  display: grid;
  grid-template-columns: 244px minmax(0, 1fr);
  gap: 18px;
  padding: 18px 22px;
}

.category-nav,
.content-panel {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  box-shadow: var(--shadow);
}

.category-nav {
  min-height: calc(100vh - 96px);
  padding: 14px;
}

.category-nav h2 {
  margin: 0 0 12px;
  padding: 0 4px;
  color: var(--muted);
  font-size: 13px;
  font-weight: 600;
}

#categoryList {
  display: grid;
  gap: 4px;
}

.category-button {
  width: 100%;
  min-height: 42px;
  display: flex;
  align-items: center;
  padding: 8px 12px;
  text-align: left;
  border: 1px solid transparent;
  border-left: 3px solid transparent;
  border-radius: 6px;
  background: transparent;
  transition: border-color 0.16s ease, background 0.16s ease;
}

.category-button:hover {
  background: var(--subtle);
}

.category-button.active {
  border-color: #d7e3ff;
  border-left-color: var(--primary);
  background: var(--primary-soft);
}

.category-button span {
  color: #1f2937;
  font-weight: 700;
}

.category-button.active span {
  color: var(--primary);
}

.content-panel {
  min-height: calc(100vh - 96px);
  min-width: 0;
  overflow: hidden;
  padding: 20px;
}

.content-header {
  justify-content: space-between;
  gap: 16px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
}

.eyebrow {
  margin: 0 0 4px;
  color: var(--primary);
  font-size: 12px;
  font-weight: 600;
}

.content-header h2 {
  margin: 0;
  font-size: 21px;
  letter-spacing: 0;
}

.content-actions {
  gap: 8px;
}

.content-search-control {
  height: 34px;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 10px;
  border: 1px solid var(--border);
  border-radius: 7px;
  background: #ffffff;
  color: var(--muted);
  font-size: 13px;
  white-space: nowrap;
}

.content-search-control input {
  width: 132px;
  border: 0;
  outline: 0;
  background: transparent;
  color: var(--text);
  font: inherit;
}

.content-search-control input::placeholder {
  color: #94a3b8;
}

.filter-bar {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 8px;
  align-items: end;
  margin-top: 14px;
  padding: 9px 10px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: #fbfdff;
}

.filter-bar-three {
  grid-template-columns: repeat(3, minmax(0, 1fr));
}

.filter-bar-five {
  grid-template-columns: repeat(5, minmax(0, 1fr));
}

.filter-bar label {
  display: grid;
  gap: 4px;
}

.filter-bar span {
  color: var(--muted);
  font-size: 11px;
}

.filter-bar select {
  width: 100%;
  height: 30px;
  padding: 0 7px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: #fff;
}

.record-list-shell {
  margin-top: 16px;
  overflow-x: auto;
  overflow-y: hidden;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: #fff;
}

.record-list-shell::-webkit-scrollbar {
  height: 8px;
}

.record-list-shell::-webkit-scrollbar-thumb {
  background: #cbd5e1;
  border-radius: 999px;
}

.record-list-shell::-webkit-scrollbar-track {
  background: #f8fafc;
}

.record-list-header {
  display: grid;
  grid-template-columns: 82px 64px 110px 126px 100px 100px 70px;
  min-width: 820px;
  align-items: center;
  gap: 12px;
  min-height: 38px;
  padding: 0 14px;
  color: #475467;
  background: #f8fafc;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  font-weight: 600;
}

.record-list {
  display: grid;
  gap: 0;
  min-width: 820px;
  max-height: 360px;
  overflow-y: auto;
  overflow-x: hidden;
  overscroll-behavior: contain;
}

.record-list::-webkit-scrollbar {
  width: 8px;
}

.record-list::-webkit-scrollbar-thumb {
  background: #cbd5e1;
  border-radius: 999px;
}

.record-list::-webkit-scrollbar-track {
  background: #f8fafc;
}

.record-card {
  display: grid;
  grid-template-columns: 82px 64px 110px 126px 100px 100px 70px;
  min-width: 820px;
  align-items: center;
  gap: 12px;
  min-height: 58px;
  padding: 10px 14px;
  border: 0;
  border-bottom: 1px solid #edf1f6;
  border-radius: 0;
  background: #fff;
  cursor: default;
}

.record-card:last-child {
  border-bottom: 0;
}

.record-card > .link-button {
  justify-self: start;
  align-self: center;
}

.neuro-record-list-header,
.neuro-record-card {
  grid-template-columns: repeat(4, 116px) repeat(5, 116px) 152px;
  min-width: 1294px;
  box-sizing: border-box;
  gap: 10px;
  padding-left: 14px;
  padding-right: 56px;
}

.neuro-record-list-shell .record-list {
  min-width: 1294px;
}

.neuro-record-list-header span {
  justify-self: start;
  text-align: left;
}

.neuro-record-card .record-field {
  justify-items: start;
  text-align: left;
}

.neuro-record-list-header span:nth-child(n + 5) {
  justify-self: center;
  text-align: center;
}

.neuro-record-card > .link-button {
  justify-self: center;
  min-width: 42px;
  margin-right: 18px;
}

.image-preview-button {
  width: 58px;
  height: 28px;
  justify-self: center;
  border: 1px solid #bfdbfe;
  border-radius: 999px;
  color: #1d4ed8;
  background: #eff6ff;
  font-size: 12px;
  cursor: pointer;
}

.image-preview-button:hover {
  border-color: #93c5fd;
  background: #dbeafe;
}

.device-record-list-header,
.device-record-card {
  grid-template-columns: 82px 112px 124px 108px 128px 108px 126px 82px;
  min-width: 988px;
}

.device-record-list-shell .record-list {
  min-width: 988px;
  max-height: calc(100vh - 300px);
  scrollbar-gutter: stable;
  padding-right: 8px;
}

.device-filter-panel {
  margin: 16px 22px 20px;
  padding: 16px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: #fbfdff;
}

.device-filter-panel label {
  display: grid;
  gap: 8px;
  max-width: 280px;
}

.device-filter-panel span {
  color: #475467;
  font-size: 13px;
  font-weight: 600;
}

.device-filter-panel select {
  height: 34px;
  padding: 0 10px;
  border: 1px solid var(--border);
  border-radius: 7px;
  background: #fff;
}

.device-record-list-header span:nth-child(3),
.device-record-list-header span:nth-child(4),
.device-record-list-header span:nth-child(5),
.device-record-list-header span:nth-child(6),
.device-record-list-header span:nth-child(7),
.device-record-list-header span:nth-child(8),
.device-record-card .record-field:nth-child(3),
.device-record-card .record-field:nth-child(5),
.device-record-card .record-field:nth-child(7),
.device-record-card > .image-preview-button,
.device-record-card > .link-button {
  justify-self: center;
  text-align: center;
}

.device-record-card .record-field:nth-child(3),
.device-record-card .record-field:nth-child(5),
.device-record-card .record-field:nth-child(7) {
  justify-items: center;
}

.personal-record-list-header,
.personal-record-card {
  grid-template-columns: minmax(78px, 0.85fr) minmax(64px, 0.7fr) minmax(110px, 1fr) minmax(120px, 1fr) minmax(160px, 1.35fr) minmax(76px, 0.7fr);
  min-width: 760px;
}

.personal-record-list-shell .record-list {
  min-width: 760px;
}

.algorithm-record-list-header,
.algorithm-record-card {
  grid-template-columns: minmax(84px, 0.7fr) minmax(64px, 0.5fr) minmax(108px, 0.85fr) minmax(118px, 0.85fr) minmax(148px, 1.1fr) minmax(168px, 1.25fr) minmax(78px, 0.6fr) minmax(76px, 0.55fr);
  min-width: 1040px;
}

.algorithm-record-list-shell .record-list {
  min-width: 1040px;
}

.training-record-list-header,
.training-record-card {
  grid-template-columns: 82px 64px 108px 118px 108px 108px 108px 108px 70px;
  min-width: 960px;
}

.training-record-list-shell .record-list {
  min-width: 960px;
}

.panorama-record-list-header,
.panorama-record-card {
  grid-template-columns: 82px 150px 140px 180px 108px 128px 118px 96px;
  min-width: 1084px;
  box-sizing: border-box;
}

.panorama-record-list-shell {
  max-width: 100%;
}

.panorama-record-list-shell .record-list {
  min-width: 1084px;
  max-height: calc(100vh - 246px);
  padding-right: 8px;
  scrollbar-gutter: stable;
}

.panorama-record-list-header span:nth-child(5),
.panorama-record-list-header span:nth-child(8) {
  justify-self: center;
  text-align: center;
}

.panorama-record-card > .image-preview-button,
.panorama-record-card > .link-button,
.panorama-detail-strip > .image-preview-button {
  justify-self: center;
  min-width: 44px;
}

.record-card:hover {
  background: #f9fbff;
}

.record-field {
  display: grid;
  gap: 2px;
}

.record-field span {
  display: none;
}

.record-field strong {
  color: #1f2937;
  font-size: 13px;
  font-weight: 400;
}

.status {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: fit-content;
  min-width: 64px;
  height: 24px;
  padding: 0 8px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 400;
}

.status.success {
  color: var(--success);
  background: #ecfdf5;
}

.status.warning {
  color: var(--warning);
  background: #fffbeb;
}

.status.danger {
  color: var(--danger);
  background: #fef2f2;
}

.link-button {
  border: 0;
  color: var(--primary);
  background: transparent;
  font-weight: 400;
  cursor: pointer;
}

.empty-state {
  min-height: 300px;
  display: grid;
  place-items: center;
  margin-top: 18px;
  padding: 24px;
  color: var(--muted);
  text-align: center;
  border: 1px dashed #cbd5e1;
  border-radius: 12px;
  background: #fbfdff;
}

.detail-view {
  display: grid;
  gap: 12px;
  margin-top: 16px;
}

.detail-toolbar {
  justify-content: space-between;
  gap: 16px;
  min-height: 38px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}

.detail-toolbar strong {
  display: block;
  color: var(--text);
  font-size: 15px;
}

.detail-actions {
  display: flex;
  align-items: center;
  gap: 8px;
}

.detail-meta-line {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 12px;
  align-items: center;
  min-height: 34px;
  padding: 8px 12px;
  color: #344054;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: #fbfdff;
}

.detail-meta-line span {
  font-size: 13px;
  font-weight: 400;
  line-height: 1.35;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.detail-filter-row {
  display: grid;
  grid-template-columns: 1.35fr 1fr;
  gap: 10px;
}

.profile-filter-row {
  grid-template-columns: minmax(260px, 1fr);
}

.detail-card,
.detail-select,
.detail-date-range,
.chart-placeholder {
  border: 1px solid var(--border);
  border-radius: 8px;
  background: #fbfdff;
}

.detail-card,
.detail-select,
.detail-date-range {
  min-height: 58px;
  padding: 10px 12px;
}

.detail-card span,
.detail-select span,
.detail-date-range span {
  display: block;
  color: var(--muted);
  font-size: 11px;
  line-height: 1.2;
}

.detail-card strong {
  display: block;
  margin-top: 5px;
  color: #101828;
  font-size: 14px;
  line-height: 1.35;
  font-weight: 700;
}

.detail-select select {
  width: 100%;
  height: 30px;
  margin-top: 6px;
  padding: 0 8px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: #fff;
}

.detail-date-range div {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-top: 6px;
}

.detail-date-range input {
  min-width: 0;
  width: 100%;
  height: 30px;
  padding: 0 8px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: #fff;
}

.data-strip-list {
  display: grid;
  gap: 8px;
}

.profile-info-strip {
  display: grid;
  grid-template-columns: 90px 90px 160px minmax(220px, 1fr);
  gap: 12px;
  align-items: center;
  min-height: 66px;
  padding: 12px 16px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: #fff;
}

.profile-info-strip div {
  display: grid;
  gap: 4px;
}

.profile-info-strip span {
  color: var(--muted);
  font-size: 12px;
}

.profile-info-strip strong {
  color: #1f2937;
  font-size: 13px;
  font-weight: 400;
}

.surgery-record-panel {
  display: grid;
  gap: 10px;
  padding: 14px 16px 16px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: #fff;
}

.surgery-record-panel h3 {
  margin: 0;
  color: #1f2937;
  font-size: 14px;
  font-weight: 600;
}

.surgery-record-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.upload-button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  height: 30px;
  padding: 0 12px;
  color: var(--primary);
  font-size: 12px;
  border: 1px solid #bfdbfe;
  border-radius: 6px;
  background: #eff6ff;
  cursor: pointer;
}

.upload-button:hover {
  border-color: #93c5fd;
  background: #dbeafe;
}

.upload-button input {
  display: none;
}

.surgery-record-box {
  min-height: 150px;
  display: grid;
  place-items: center;
  color: var(--muted);
  font-size: 12px;
  border: 1px dashed #cbd5e1;
  border-radius: 8px;
  background: #f8fafc;
}

.data-strip-head,
.data-strip {
  display: grid;
  grid-template-columns: 28px 120px 110px 136px 128px 128px 64px;
  align-items: center;
  gap: 10px;
}

.data-strip-head {
  padding: 0 14px;
  color: var(--muted);
  font-size: 12px;
}

.data-strip {
  min-height: 48px;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: #fff;
}

.neuro-detail-strip-head,
.neuro-detail-strip {
  grid-template-columns: 28px 132px 132px 132px 72px;
}

.neuro-detail-strip-head span:nth-child(n + 3),
.neuro-detail-strip .image-preview-button,
.neuro-detail-strip .link-button {
  justify-self: center;
}

.neuro-detail-strip .data-type-button {
  min-width: 86px;
  width: auto;
  padding: 0 14px;
}

.behavior-detail-strip-head,
.behavior-detail-strip {
  grid-template-columns: 24px 88px 88px 118px 108px 92px 138px 46px 64px;
  gap: 8px;
  padding-left: 10px;
  padding-right: 10px;
}

.behavior-detail-strip-head span,
.behavior-detail-strip span,
.behavior-detail-strip .link-button {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.behavior-detail-strip .link-button {
  justify-self: start;
}

.model-detail-strip-head,
.model-detail-strip {
  grid-template-columns: 28px 132px minmax(160px, 1.1fr) minmax(130px, 0.9fr) 70px;
}

.training-detail-strip-head,
.training-detail-strip {
  grid-template-columns: 28px 150px minmax(220px, 1fr) 70px;
}

.device-detail-strip-head,
.device-detail-strip {
  grid-template-columns: 104px 112px 96px 128px 96px 126px 106px 116px 150px 86px 96px;
  min-width: 1344px;
  width: 1344px;
}

.device-detail-list {
  max-width: 100%;
  max-height: calc(100vh - 272px);
  overflow: auto;
  padding-right: 10px;
  padding-bottom: 6px;
  overscroll-behavior: contain;
  scrollbar-gutter: stable both-edges;
}

.device-detail-list::-webkit-scrollbar {
  width: 8px;
  height: 8px;
}

.device-detail-list::-webkit-scrollbar-thumb {
  background: #cbd5e1;
  border-radius: 999px;
}

.device-detail-list::-webkit-scrollbar-track {
  background: #f8fafc;

    <script>
const categories = [
  { key: "patientPanorama", label: "患者全景", hint: "版本 / 指标 / 配置" },
  { key: "neuroPhysiology", label: "神经生理", hint: "信号 / 图像 / 质量" },
  { key: "algorithmModel", label: "算法模型", hint: "模型 / 版本 / 指标" },
  { key: "userBehavior", label: "患者行为", hint: "任务 / 点击 / 日志" },
  { key: "trainingConfig", label: "训练配置", hint: "范式 / 参数 / 配置" },
  { key: "personalInfo", label: "患者信息", hint: "资料 / 医院 / 访视" },
  { key: "deviceManagement", label: "异常管理", hint: "事件 / 通道 / 处置" }
];

const records = {
  neuroPhysiology: [
    makeRecord("0001", "医院 A", "术后1个月", "12 条", "已完成", "神经生理采集", "2026-05-10 19:30 - 20:10", "Raw Data"),
    makeRecord("0111", "医院 B", "术后2个月", "8 条", "已完成", "神经信号质量", "2026-05-10 20:15 - 20:42", "RMS"),
    makeRecord("0123", "医院 A", "术后3个月", "5 条", "待复核", "频谱分析", "2026-05-09 18:20 - 18:55", "频谱图")
  ],
  algorithmModel: [
    makeRecord("0001", "医院 A", "术后1个月", "4 个模型", "可用", "Decoder 模型", "2026-05-10 21:00 - 21:30", "模型评估"),
    makeRecord("0111", "医院 B", "术后2个月", "3 个模型", "可用", "Classifier 模型", "2026-05-09 18:00 - 18:35", "训练结果"),
    makeRecord("0123", "医院 A", "术后3个月", "2 个模型", "待确认", "Calibration 模型", "2026-05-08 16:00 - 16:25", "校准参数")
  ],
  userBehavior: [
    makeRecord("0001", "医院 A", "术后1个月", "8 个 Session", "已完成", "Combo Session", "2026-05-10 19:56 - 20:08", "行为日志"),
    makeRecord("0111", "医院 B", "术后2个月", "6 个 Session", "已完成", "Keyboard Session", "2026-05-10 20:18 - 20:30", "点击记录"),
    makeRecord("0123", "医院 A", "术后3个月", "4 个 Session", "已完成", "Mechanical Arm", "2026-05-10 20:44 - 20:58", "任务指标")
  ],
  trainingConfig: [
    makeRecord("0001", "医院 A", "术后1个月", "3 套配置", "启用", "Combo 训练范式", "2026-05-10 09:00 - 09:10", "训练配置"),
    makeRecord("0111", "医院 B", "术后2个月", "2 套配置", "启用", "轮椅控制映射", "2026-05-10 09:30 - 09:42", "设备映射"),
    makeRecord("0123", "医院 A", "术后3个月", "2 套配置", "停用", "阈值参数", "2026-05-09 10:00 - 10:12", "参数版本")
  ],
  patientPanorama: [
    makeRecord("0001", "医院 A", "术后1个月", "1 份全景", "已完成", "患者全景", "2026-05-10 19:56 - 20:08", "全景指标"),
    makeRecord("0002", "医院 B", "术后2个月", "1 份全景", "已完成", "患者全景", "2026-05-10 20:18 - 20:30", "全景指标"),
    makeRecord("0003", "医院 A", "术后3个月", "1 份全景", "待复核", "患者全景", "2026-05-09 18:20 - 18:55", "全景指标"),
    makeRecord("0004", "医院 C", "术后4个月", "1 份全景", "进行中", "患者全景", "2026-05-08 16:00 - 16:25", "全景指标")
  ],
  personalInfo: [
    makeRecord("0001", "医院 A", "术后1个月", "1 份档案", "有效", "基础资料", "2026-05-10", "个人档案"),

  ],
  deviceManagement: [
    makeRecord("0001", "医院 A", "术后1个月", "5 次记录", "正常", "供电体连接", "2026-05-10 19:00 - 20:30", "设备状态"),

    makeRecord("0123", "医院 A", "术后3个月", "3 次记录", "已记录", "系统连接时长", "2026-05-10 19:00 - 20:12", "使用时长")
  ]
};

const extraSubjects = [
  ["0201", "医院 B", "术后4个月", "10 条", "已完成"],
  ["0208", "医院 C", "术后5个月", "7 条", "待复核"],

  ["0830", "医院 B", "术后3个月", "13 条", "已完成"]

Object.entries(records).forEach(([categoryKey, list]) => {
  const base = list[0];
  extraSubjects.forEach(([subjectId, hospital, postOpTime, count, status], index) => {
    list.push(makeRecord(
      subjectId,
      hospital,
      postOpTime,
      count.replace("条", base.availableCount.includes("模型") ? "个模型" : base.availableCount.includes("Session") ? "个 Session" : base.availableCount.includes("配置") ? "套配置" : base.availableCount.includes("档案") ? "份档案" : base.availableCount.includes("记录") ? "次记录" : "条"),
      status,
      `${base.recordType}-${index + 1}`,
      `2026-05-${String(11 + index).padStart(2, "0")} 09:00 - 10:00`,
      base.dataType

function makeRecord(subjectId, hospital, postOpTime, availableCount, status, recordType, timeRange, dataType) {
  const profile = {
    "0001": { ageGroup: "18-35岁", gender: "男", implantLocation: "左侧运动皮层" },
    "0111": { ageGroup: "36-55岁", gender: "女", implantLocation: "右侧运动皮层" },
    "0123": { ageGroup: "56岁以上", gender: "男", implantLocation: "双侧运动皮层" }
  }[subjectId] || { ageGroup: "未知", gender: "未知", implantLocation: "未知" };

  return {
    subjectId,
    hospital,
    postOpTime,
    ageGroup: profile.ageGroup,
    gender: profile.gender,
    implantLocation: profile.implantLocation,
    recordDate: timeRange.slice(0, 10),
    dateRange: formatDateRange(timeRange.slice(0, 10)),
    availableCount,
    status,
    recordType,
    timeRange,
    dataType,
    dataRows: []
  };

function formatDateRange(startDate) {
  const date = new Date(`${startDate}T00:00:00`);
  if (Number.isNaN(date.getTime())) return startDate;
  const endDate = new Date(date);
  endDate.setDate(endDate.getDate() + 2);
  return `${startDate} 至 ${endDate.toISOString().slice(0, 10)}`;
}

function filteredRecords() {
  const keyword = state.search.trim().toLowerCase();
  const recordKeyword = state.recordSearch.trim().toLowerCase();
  const source = records[state.activeCategory] || [];
  return source.filter((record) => {
    const keywordMatched = !keyword || [
      record.subjectId,
      record.hospital,
      record.ageGroup,
      record.gender,
      record.postOpTime,
      record.implantLocation,
      record.availableCount,
      record.status,
      record.recordType
    ].join(" ").toLowerCase().includes(keyword);
    const recordKeywordMatched = !recordKeyword || String(record.subjectId || "").toLowerCase().includes(recordKeyword);

    const subjectMatched = state.filters.subjectId === "all" || record.subjectId === state.filters.subjectId;
    const hospitalMatched = state.filters.hospital === "all" || record.hospital === state.filters.hospital;
    const ageMatched = state.filters.ageGroup === "all" || record.ageGroup === state.filters.ageGroup;
    const genderMatched = state.filters.gender === "all" || record.gender === state.filters.gender;
    const implantMatched = state.activeCategory !== "personalInfo" || state.filters.implantLocation === "all" || record.implantLocation === state.filters.implantLocation;
    const postOpMatched = !["algorithmModel", "trainingConfig"].includes(state.activeCategory) || state.filters.postOpTime === "all" || record.postOpTime === state.filters.postOpTime;
    return keywordMatched && recordKeywordMatched && subjectMatched && hospitalMatched && ageMatched && genderMatched && implantMatched && postOpMatched;
  });
}

      ${showPostOpStageFilter ? `<label><span>术后阶段</span>${selectHtml("postOpTime", postOpStageOptions(), state.filters.postOpTime, "全部阶段")}</label>` : ""}

function filterBarLayoutClass(showImplantFilter, showPostOpStageFilter, showAlgorithmPostOpFilter) {

  return ["通道异常", "设备连接", "信号漂移", "电源异常", "温湿度异常"];

  return deviceEventTypes()[index % deviceEventTypes().length];
}

function deviceSystemHandling(index) {
  return ["自动标记", "人工复核", "建议关闭通道", "观察中"][index % 4];
}

function deviceCloseDecision(index) {
  return index % 3 === 0 ? "建议关闭" : index % 3 === 1 ? "暂不关闭" : "已关闭";
}

function deviceChannelStatus(record, index) {
  const closedChannels = [12, 18, 31, 45, 62].map((item) => item + index);
  const confidence = [96.8, 94.1, 91.6, 97.2, 93.5][index % 5];
  return {
    channelStatus: index % 3 === 0 ? "建议关闭" : index % 3 === 1 ? "需要复核" : "已恢复",
    abnormalType: deviceEventType(record, index),
    abnormalLevel: index % 3 === 0 ? "高" : index % 3 === 1 ? "中" : "低",
    closedChannels: closedChannels.slice(0, 3).join("、"),
    confidence: `${confidence.toFixed(1)}%`
  };
}

function deviceDetailRows(record) {
  const baseIndex = Math.max(0, (records.deviceManagement || []).findIndex((item) => item.subjectId === record.subjectId));
  return Array.from({ length: 8 }, (_, index) => {
    const status = deviceChannelStatus(record, baseIndex + index);
    return {
      id: `${record.subjectId}-device-${String(index + 1).padStart(3, "0")}`,
      collectDate: shiftDate(record.recordDate, -index),
      eventType: deviceEventType(record, baseIndex + index),
      systemHandling: deviceSystemHandling(index),
      closeDecision: deviceCloseDecision(index),
      abnormalType: status.abnormalType,
      severity: status.abnormalLevel
    };
  }).sort((a, b) => b.collectDate.localeCompare(a.collectDate));
}

function metricOneValue(record, index) {

}

function metricTwoValue(record, index) {

function trainingStrategyValue(index) {

}

function calibrationStrategyValue(index) {

function patientPanoramaMetrics(index) {
  const deviceVersions = ["植入体连接状态 v1.6", "采集端固件 v2.3", "无线底座 v1.9", "传感模块 v2.0"];
  const configVersions = ["配置包 2026.05-A", "配置包 2026.05-B", "配置包 2026.04-C", "配置包 2026.04-D"];
  return {

    modelVersion: currentModelName(index),
    trainingTask: trainingTaskName(index),
    configVersion: configVersions[index % configVersions.length],

}

function patientPanoramaConfig(record, index) {

function patientPanoramaRecordIndex(record) {

function patientPanoramaDailyRows(record) {

  return Array.from({ length: 7 }, (_, index) => ({

    trainingTask: metrics.trainingTask,
    configVersion: metrics.configVersion,
    fluency: `${Math.max(70.5, parseFloat(metrics.fluency) - index * 0.6).toFixed(2)} bits/min`,
    reliability: `${Math.max(212, parseInt(metrics.reliability, 10) - index * 2)} 通道`
  })).sort((a, b) => a.collectDate.localeCompare(b.collectDate));
}

function behaviorMetricSummary(record) {
  const previousType = state.detailDataType;
  const previousStart = state.detailDateRange.start;
  const previousEnd = state.detailDateRange.end;

  state.detailDataType = "all";
  state.detailDateRange.start = "";
  state.detailDateRange.end = "";

  try {
    const firstRow = detailRows(record)[0] || {};
    return {
      fluency: firstRow.fluency || "",
      reliability: firstRow.reliability || ""
    };
  } finally {
    state.detailDataType = previousType;
    state.detailDateRange.start = previousStart;
    state.detailDateRange.end = previousEnd;
  }
}

function behaviorDailyRows(row) {
  const month = row.collectMonth || "";
  const days = ["06", "14", "22"];
  return days.map((day, index) => {
    const successRate = Math.max(80, parseFloat(row.successRate) - index * 0.8).toFixed(2);
    const accuracy = Math.max(78, parseFloat(row.accuracy) - index * 0.7).toFixed(2);
    const reliability = Math.max(198, parseInt(row.reliability, 10) - index * 2);
    return {
      date: month ? `${month}-${day}` : shiftDate(state.selectedRecord.recordDate, index * 7),
      successRate: `${successRate}%`,
      accuracy: `${accuracy}%`,
      reliability: `${reliability} 通道`
    };
  });
}

  };

function neuroRawValue(index) {
  const values = ["98.2%", "97.6%", "96.9%", "98.8%", "95.7%", "97.3%"];
  return values[index % values.length];
}

function neuroBinCountValue(index) {
  const values = ["24 组", "22 组", "25 组", "23 组", "21 组", "24 组"];
  return values[index % values.length];
}

function neuroSbpValue(index) {
  const values = ["0.82", "0.79", "0.85", "0.81", "0.77", "0.83"];
  return values[index % values.length];
}

function neuroCollectTimeRange(index) {
  const ranges = ["10:00-12:00", "13:30-15:00", "15:20-16:40", "09:30-11:10", "14:00-15:30", "16:00-17:20"];
  return ranges[index % ranges.length];
}

function neuroSegmentRows(index) {
  const rangeGroups = [
    ["10:00-12:00", "14:00-15:20", "16:00-17:00"],
    ["09:30-10:40", "11:00-12:10"],
    ["13:00-14:20", "15:00-16:30", "17:00-17:40"]
  ];
  return rangeGroups[index % rangeGroups.length].map((range, segmentIndex) => {
    const valueIndex = index + segmentIndex;
    return {
      range,
      raw: neuroRawValue(valueIndex),
      binCount: neuroBinCountValue(valueIndex),
      sbp: neuroSbpValue(valueIndex)
    };
  });
}

function renderNeuroSegmentTable(index) {
  const selectedType = neuralDataTypeForRow(index);
  const columns = [
    { label: "采集时间段", value: (segment) => segment.range },
    { label: "Raw", value: (segment) => segment.raw }
  ];
  if (selectedType === "binCount") {
    columns.push({ label: "binCount", value: (segment) => segment.binCount });
  }
  if (selectedType === "sbp") {
    columns.push({ label: "sbp", value: (segment) => segment.sbp });
  }

  const gridTemplate = `repeat(${columns.length}, minmax(88px, 1fr))`;
  return `
    <div class="neuro-segment-table">
      <div class="neuro-segment-head" style="grid-template-columns: ${gridTemplate}">
        ${columns.map((column) => `<span>${column.label}</span>`).join("")}
      </div>
      ${neuroSegmentRows(index).map((segment) => `
        <div class="neuro-segment-row" style="grid-template-columns: ${gridTemplate}">
          ${columns.map((column) => `<strong>${column.value(segment)}</strong>`).join("")}
        </div>
      `).join("")}
    </div>
  `;
}

function trainingConfigChoice(index) {
  const choices = ["手腕", "食指", "拇指", "肘部", "肩部", "掌心"];
  return choices[index % choices.length];
}

function trainingHistoryRows(dateText, index) {
  return [2, 5, 9].map((offset, historyIndex) => ({
    date: shiftDate(dateText, -offset),
    choice: trainingConfigChoice(index + historyIndex)
  }));
}

function detailRows(record) {
  const source = detailDataCatalog[state.activeCategory] || [];
  const dataTypes = detailTypeOptions();
  if (state.activeCategory === "patientPanorama") {
    return patientPanoramaDailyRows(record);
  }
  if (state.activeCategory === "deviceManagement") {
    return deviceDetailRows(record);
  }
  const rowCount = state.activeCategory === "userBehavior" ? 4 : state.activeCategory === "trainingConfig" ? dataTypes.length : Math.max(10, source.length);
  const rows = Array.from({ length: rowCount }, (_, index) => {
    if (state.activeCategory === "userBehavior") {
      const successRate = Math.max(82.6, 96.4 - index * 1.1).toFixed(2);
      const fluency = Math.max(65.2, 82.3 - index * 1.4).toFixed(2);
      const accuracy = Math.max(80.1, 94.8 - index * 1.2).toFixed(2);
      const reliability = Math.max(206, 238 - index * 3);
      const monthlyUsage = Math.max(30.5, 42.5 - index * 0.9).toFixed(2);
      return {
        id: `${record.subjectId}-${String(index + 1).padStart(3, "0")}`,
        collectDate: shiftDate(record.recordDate, index % 6),
        collectMonth: shiftMonth(record.recordDate, index + 1),
        dataType: "行为指标",
        successRate: `${successRate}%`,
        fluency: `${fluency} bits/min`,
        accuracy: `${accuracy}%`,
        reliability: `${reliability} 通道`,
        monthlyUsage: `${monthlyUsage} h`,
        action: "查看"
      };
    }
    if (state.activeCategory === "deviceManagement") {
      const dayOffset = index % 6;
      const collectDate = shiftDate(record.recordDate, dayOffset);
      return {
        id: `${record.subjectId}-${String(index + 1).padStart(3, "0")}`,
        collectDate,
        dataType: "硬件状态",
        boardVoltage: `${(3.30 + index * 0.01).toFixed(2)} V`,
        boardCurrent: `${120 + index * 3} mA`,
        boardTemperature: `${(36.8 + index * 0.3).toFixed(1)} ℃`,
        sht45: `${(27.1 + index * 0.2).toFixed(1)} ℃ / ${(48.2 + index * 0.5).toFixed(1)}%`,
        wf280a: `${(101.2 + index * 0.1).toFixed(1)} kPa / ${(26.9 + index * 0.2).toFixed(1)} ℃`,
        action: "查看"
      };
    }
    const reliableChannels = Math.max(196, 238 - index * 3);
    const abnormal = index % 4 === 3 ? "是" : "否";
    const dayOffset = index % 6;
    const collectDate = shiftDate(record.recordDate, dayOffset);
    const dataType = dataTypes[index % dataTypes.length];
    return {
      id: `${record.subjectId}-${String(index + 1).padStart(3, "0")}`,
      collectDate,
      dataType,
      reliableChannels: `${reliableChannels} 通道`,
      qualityLevel: reliableChannels >= 230 ? "优" : reliableChannels >= 215 ? "良" : "需复核",
      hasAbnormal: abnormal,
      action: "查看"
    };
  });

  if (state.activeCategory === "userBehavior") return rows;
  if (state.detailDataType === "all") return filterRowsByDetailDate(rows);
  return filterRowsByDetailDate(rows.filter((row) => row.dataType === state.detailDataType));
}

function filterRowsByDetailDate(rows) {
  return rows.filter((row) => {
    if (!row.collectDate) return true;
    const startMatched = !state.detailDateRange.start || row.collectDate >= state.detailDateRange.start;
    const endMatched = !state.detailDateRange.end || row.collectDate <= state.detailDateRange.end;
    return startMatched && endMatched;
  });
}

function detailTypeOptions() {
  if (state.activeCategory === "algorithmModel") return ["模型数据"];
  if (state.activeCategory === "userBehavior") return ["行为指标"];
  if (state.activeCategory === "trainingConfig") return ["卡片配置策略", "映射配置策略", "训练策略", "校准策略"];
  return ["Raw", "binCount", "sbp"];
}

function neuralDataTypeForRow(index) {
  return ["sbp", "binCount", "Raw", "binCount", "sbp", "Raw"][index % 6];
}

function shouldHideDetailTypeSelector() {
  return ["neuroPhysiology", "algorithmModel", "userBehavior", "trainingConfig", "patientPanorama", "personalInfo", "deviceManagement"].includes(state.activeCategory);
}

function shouldHideDetailDateRange() {
  return ["trainingConfig", "patientPanorama", "personalInfo"].includes(state.activeCategory);
}

function detailFilterRowClass(hideTypeSelector, hideDateRange) {
  if (hideTypeSelector || hideDateRange) return "profile-filter-row";
  return "";
}

function shiftDate(dateText, offset) {
  const date = new Date(`${dateText}T00:00:00`);
  if (Number.isNaN(date.getTime())) return dateText;
  date.setDate(date.getDate() + offset);
  return date.toISOString().slice(0, 10);
}

function shiftMonth(dateText, offset) {
  const date = new Date(`${dateText}T00:00:00`);
  if (Number.isNaN(date.getTime())) return dateText.slice(0, 7);
  date.setMonth(date.getMonth() + offset);
  return date.toISOString().slice(0, 7);
}

  if (detailPostOpMonth) {
    state.detailPostOpMonth = detailPostOpMonth.value;
    state.expandedDataRow = "";
    state.selectedDetailRows = [];
    render();
    return;
  }
  if (deviceEventFilter) {
    state.deviceEventType = deviceEventFilter.value;
    render();
    return;
  }
  if (!select) return;
  state.filters[select.dataset.filter] = select.value;
  state.mode = "list";
  state.selectedRecord = null;
  render();
});

document.querySelector(".content-panel").addEventListener("input", (event) => {
  const detailDate = event.target.closest("[data-detail-date]");
  if (!detailDate) return;
  state.detailDateRange[detailDate.dataset.detailDate] = detailDate.value;
  state.expandedDataRow = "";
  render();
});

el.backButton.addEventListener("click", backToList);
el.patientUploadButton?.addEventListener("click", openPatientInfoModal);
el.refreshButton.addEventListener("click", () => showToast("已刷新记录列表"));
el.exportHistoryButton.addEventListener("click", () => {
  state.mode = "exports";
  state.selectedRecord = null;
  render();
});
el.searchInput.addEventListener("input", (event) => {
  state.search = event.target.value;
  state.mode = "list";
  state.selectedRecord = null;
  render();
});

el.recordSearchInput.addEventListener("input", (event) => {
  state.recordSearch = event.target.value;
  state.mode = "list";
  state.selectedRecord = null;
  render();
});

el.loginSubmitButton.addEventListener("click", login);
el.passwordInput.addEventListener("keydown", (event) => {
  if (event.key === "Enter") login();
});
el.accountInput.addEventListener("keydown", (event) => {
  if (event.key === "Enter") login();
});

render();

    </script>
  </body>
</html>
